<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory | Demo Organization</title>
    <style>
         :root {
            --ink: #172126;
            --muted: #5e6b70;
            --line: #d9e1de;
            --paper: #f6f7f3;
            --surface: #ffffff;
            --green: #12624f;
            --green-deep: #0b3f35;
            --gold: #b98b2f;
            --blue: #315d77;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--paper);
            line-height: 1.6;
        }
        
        a {
            color: inherit;
            text-decoration: none;
        }
        
        button,
        input {
            font: inherit;
        }
        
        img {
            display: block;
            max-width: 100%;
        }
        
        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(217, 225, 222, 0.9);
            background: rgba(246, 247, 243, 0.92);
            backdrop-filter: blur(14px);
        }
        
        .nav {
            width: min(1140px, calc(100% - 32px));
            min-height: 76px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 13px;
            min-width: 0;
            font-weight: 800;
            letter-spacing: 0;
        }
        
        .brand-mark {
            width: 48px;
            height: 48px;
            flex: 0 0 auto;
        }
        
        .brand-text {
            display: grid;
            line-height: 1.15;
        }
        
        .brand-text span:first-child {
            font-size: clamp(1rem, 2vw, 1.18rem);
        }
        
        .brand-text span:last-child {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #334247;
            font-size: 0.95rem;
            font-weight: 700;
        }
        
        .nav-links a {
            padding: 10px 12px;
            border-radius: 6px;
        }
        
        .nav-links a:hover,
        .nav-links a:focus-visible,
        .nav-links a[aria-current="page"] {
            background: #e7ece8;
            outline: none;
        }
        
        main {
            min-height: calc(100svh - 137px);
        }
        
        .page-hero {
            border-bottom: 1px solid var(--line);
            background: linear-gradient(90deg, rgba(11, 63, 53, 0.94), rgba(49, 93, 119, 0.82)), url("assets/hero-bg.jpg") center / cover no-repeat;
            color: #ffffff;
        }
        
        .page-hero-inner {
            width: min(1140px, calc(100% - 32px));
            margin: 0 auto;
            padding: 72px 0 58px;
        }
        
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 16px;
            font-size: 0.82rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .eyebrow::before {
            width: 38px;
            height: 2px;
            content: "";
            background: var(--gold);
        }
        
        h1,
        h2,
        h3,
        p {
            margin: 0;
        }
        
        h1 {
            max-width: 760px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2.4rem, 6vw, 5rem);
            line-height: 1;
            letter-spacing: 0;
            text-wrap: balance;
        }
        
        .hero-copy {
            max-width: 620px;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: clamp(1rem, 2vw, 1.16rem);
        }
        
        .section {
            width: min(1140px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 76px;
        }
        
        .toolbar {
            max-width: 620px;
            margin-bottom: 24px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
        }
        
        .field {
            min-width: 0;
        }
        
        .field label {
            display: block;
            margin-bottom: 6px;
            color: var(--green);
            font-size: 0.76rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        
        .field input {
            width: 100%;
            min-height: 44px;
            border: 1px solid #cbd7d3;
            border-radius: 6px;
            color: var(--ink);
            background: #fbfcf9;
        }
        
        .field input {
            padding: 0 13px;
        }
        
        .directory-head {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
        }
        
        .directory-head h2 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(1.8rem, 3vw, 2.7rem);
            line-height: 1.08;
            letter-spacing: 0;
        }
        
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 380px), 1fr));
            gap: 24px;
        }
        
        .member-card {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 20px;
            align-items: start;
            padding: 24px;
            border: 1px solid rgba(217, 225, 222, 0.6);
            border-radius: 16px;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.32;
            background: var(--surface);
            box-shadow: 0 4px 12px rgba(23, 33, 38, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .member-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(23, 33, 38, 0.08);
        }
        
        .member-photo {
            width: 108px;
            aspect-ratio: 4 / 5;
            margin: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: #f9faf7;
        }
        
        .member-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        
        .member-info {
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
        }
        
        .member-info h3 {
            margin-bottom: 5px;
            font-size: 1.08rem;
            line-height: 1.12;
        }
        
        .member-info p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.32;
            overflow-wrap: anywhere;
        }
        
        .member-contact {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }
        
        .contact-text {
            min-width: 0;
            flex: 1;
            color: var(--ink);
            font-size: 0.9rem;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .contact-action {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--green);
            background: #e6eeea;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .contact-action:hover,
        .contact-action:focus-visible {
            background: var(--green);
            color: #ffffff;
            transform: scale(1.05);
            outline: none;
        }
        
        .contact-action svg {
            width: 18px;
            height: 18px;
        }
        
        .contact-action img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        
        .footer {
            padding: 30px 0;
            color: #d6dfdc;
            background: #152522;
        }
        
        .footer-inner {
            width: min(1140px, calc(100% - 32px));
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            gap: 18px;
            font-size: 0.94rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 8px;
            width: min(500px, calc(100% - 32px));
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 1.5rem;
            margin: 0;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .form-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-primary {
            background: var(--green);
            color: white;
        }
        
        .btn-secondary {
            background: #e7ece8;
            color: var(--ink);
        }
        
        @media (max-width: 640px) {
            .nav {
                min-height: auto;
                padding: 14px 0;
                align-items: flex-start;
                flex-direction: column;
            }
            .nav-links {
                width: 100%;
                overflow-x: auto;
                padding-bottom: 2px;
            }
            .page-hero-inner {
                padding: 54px 0 44px;
            }
            .section {
                padding: 30px 0 58px;
            }
            .directory-head {
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
            }
            .member-card {
                grid-template-columns: 84px 1fr;
                gap: 16px;
                padding: 18px;
            }
            .member-photo {
                width: 84px;
            }
            .footer-inner {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <nav class="nav" aria-label="Primary navigation">
            <a class="brand" href="home.html" aria-label="Demo Organization home">
                <svg class="brand-mark" viewBox="0 0 64 64" role="img" aria-label="Organization logo">
                    <circle cx="32" cy="32" r="30" fill="#0b3f35"></circle>
                    <circle cx="32" cy="32" r="24" fill="none" stroke="#b98b2f" stroke-width="2"></circle>
                    <path d="M32 16v30M22 46h20M25 22h14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"></path>
                    <path d="M20 27l-7 12h14L20 27Zm24 0-7 12h14L44 27Z" fill="none" stroke="#fff" stroke-width="2.4" stroke-linejoin="round"></path>
                    <path d="M20 27h24" fill="none" stroke="#b98b2f" stroke-width="2.4" stroke-linecap="round"></path>
                </svg>
                <span class="brand-text">
                    <span>Demo</span>
                <span>Organization</span>
                </span>
            </a>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="directory.html" aria-current="page">Directory</a>
                <a href="home.html#contact">Contact</a>
                <a href="login.html">Login</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="page-hero">
            <div class="page-hero-inner">
                <p class="eyebrow">Member directory</p>
                <h1>Members of Demo Organization</h1>
            </div>
        </section>
        <section class="section" aria-labelledby="directory-title">
            <form class="toolbar">
                <div class="field">
                    <label for="search">Search</label>
                    <input id="search" type="search" placeholder="Search by name or ID">
                </div>
            </form>

            <div class="directory-head">
                <h2 id="directory-title">Directory listing</h2>
                <div id="admin-actions" style="display: none; gap: 10px;">
                    <button onclick="openModal()" style="padding: 8px 16px; background: var(--green); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Add Member</button>
                    <button onclick="downloadCSV()" style="padding: 8px 16px; background: var(--blue); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Download CSV</button>
                </div>
            </div>
            <div class="directory-grid" id="directory-grid">
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span>Demo Organization</span>
            <span>Directory</span>
        </div>
    </footer>

    <div id="member-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Member</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="member-form">
                <input type="hidden" id="member-id">
                <div class="field">
                    <label for="member-name">Name</label>
                    <input type="text" id="member-name" required>
                </div>
                <div class="field">
                    <label for="member-email">Email</label>
                    <input type="email" id="member-email" required>
                </div>
                <div class="field">
                    <label for="member-phone">Phone</label>
                    <input type="text" id="member-phone" required>
                </div>
                <div class="field">
                    <label for="member-photo-file">Upload Photo</label>
                    <input type="file" id="member-photo-file" accept="image/*">
                </div>
                <div class="field">
                    <label for="member-photo">Photo URL (or upload above)</label>
                    <input type="text" id="member-photo" value="members/placeholder.png">
                </div>
                <div class="field">
                    <label for="member-blood">Blood Type</label>
                    <input type="text" id="member-blood">
                </div>
                <div class="field">
                    <label for="member-vehicle">Vehicle</label>
                    <input type="text" id="member-vehicle">
                </div>
                <div class="field">
                    <label for="member-address">Address</label>
                    <input type="text" id="member-address">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentMembers = [];

        window.deleteMember = async(id) => {
            if (!confirm("Are you sure you want to delete this member?")) return;
            const token = localStorage.getItem('authToken');
            try {
                const res = await fetch(`/api/members/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("Failed to delete member.");
                }
            } catch (err) {
                alert("Network error.");
            }
        };

        window.openModal = (id = null) => {
            const modal = document.getElementById('member-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('member-form');

            form.reset();
            document.getElementById('member-id').value = '';

            if (id) {
                title.textContent = 'Edit Member';
                const member = currentMembers.find(m => m.id === id);
                if (member) {
                    document.getElementById('member-id').value = member.id;
                    document.getElementById('member-name').value = member.name || '';
                    document.getElementById('member-email').value = member.email || '';
                    document.getElementById('member-phone').value = member.phone || '';
                    document.getElementById('member-photo').value = member.photo || 'members/placeholder.png';
                    document.getElementById('member-blood').value = member.bloodType || '';
                    document.getElementById('member-vehicle').value = member.vehicle || '';
                    document.getElementById('member-address').value = member.address || '';
                }
            } else {
                title.textContent = 'Add Member';
            }

            modal.classList.add('active');
        };

        window.closeModal = () => {
            document.getElementById('member-modal').classList.remove('active');
        };

        window.downloadCSV = async() => {
            const token = localStorage.getItem('authToken');
            try {
                const res = await fetch('/api/members/csv', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'members.csv';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                } else {
                    alert("Failed to download CSV.");
                }
            } catch (err) {
                alert("Network error.");
            }
        };

        document.addEventListener('DOMContentLoaded', async() => {
                    const grid = document.getElementById('directory-grid');
                    const token = localStorage.getItem('authToken');
                    const role = localStorage.getItem('userRole');

                    const loginLink = document.querySelector('a[href="login.html"]');
                    if (token && loginLink) {
                        loginLink.textContent = 'Logout';
                        loginLink.href = '#';
                        loginLink.addEventListener('click', (e) => {
                            e.preventDefault();
                            localStorage.removeItem('authToken');
                            localStorage.removeItem('userRole');
                            window.location.reload();
                        });
                    }

                    if (role === 'admin') {
                        document.getElementById('admin-actions').style.display = 'flex';
                    }

                    const headers = {};
                    if (token) {
                        headers['Authorization'] = `Bearer ${token}`;
                    }
                    const escapeHTML = (str) => {
                        if (!str) return '';
                        return str.toString().replace(/[&<>'"]/g,
                            tag => ({
                                '&': '&amp;',
                                '<': '&lt;',
                                '>': '&gt;',
                                "'": '&#39;',
                                '"': '&quot;'
                            }[tag] || tag)
                        );
                    };

                    try {
                        const response = await fetch('/api/members', {
                            headers
                        });
                        const members = await response.json();
                        currentMembers = members;

                        const renderMembers = (membersToRender) => {
                                grid.innerHTML = '';

                                if (membersToRender.length === 0) {
                                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No members found matching your search.</p>';
                                    return;
                                }

                                membersToRender.forEach(member => {
                                            let secureInfoHTML = '';
                                            if (member.bloodType || member.vehicle || member.address) {
                                                secureInfoHTML = `
                        <div style="margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); font-size: 0.85rem; display: grid; gap: 6px; color: var(--muted);">
                            ${member.bloodType ? `<div><strong style="color: var(--ink);">Blood Type:</strong> ${escapeHTML(member.bloodType)}</div>` : ''}
                            ${member.vehicle ? `<div><strong style="color: var(--ink);">Vehicle:</strong> ${escapeHTML(member.vehicle)}</div>` : ''}
                            ${member.address ? `<div><strong style="color: var(--ink);">Address:</strong> ${escapeHTML(member.address)}</div>` : ''}
                            </div>
                        `;
                    }
                    const card = document.createElement('article');
                    card.className = 'member-card';
                    card.innerHTML = `
                        <figure class="member-photo">
                            <img src="${escapeHTML(member.photo)}" alt="${escapeHTML(member.name)}" onerror="this.src='members/placeholder.png'">
                        </figure>
                        <div class="member-info">
                            <h3>${escapeHTML(member.name)} ${role === 'admin' ? `<span style="font-size: 0.75rem; color: var(--muted); font-weight: normal; margin-left: 6px;">#${member.id}</span>` : ''}</h3>
                            <div class="member-contact">
                                <span class="contact-text" title="${escapeHTML(member.email)}">${escapeHTML(member.email)}</span>
                                <a href="mailto:${escapeHTML(member.email)}" class="contact-action" aria-label="Email">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                                </a>
                            </div>
                            <div class="member-contact">
                                <span class="contact-text" title="${escapeHTML(member.phone)}">${escapeHTML(member.phone)}</span>
                                <a href="tel:${escapeHTML(member.phone)}" class="contact-action" aria-label="Call">
                                    <img src="assets/phone.png" alt="Phone">
                                </a>
                            </div>
                            ${secureInfoHTML}
                            ${role === 'admin' ? `
                        <div style="display: flex; gap: 8px; margin-top: 16px;">
                            <button onclick="openModal(${member.id})" style="flex: 1; padding: 8px; background: #f0f4f2; color: var(--blue); border: 1px solid #d1dfd9; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: background 0.2s;">Edit</button>
                            <button onclick="deleteMember(${member.id})" style="flex: 1; padding: 8px; background: #fdf3f2; color: #d93025; border: 1px solid #f9d8d6; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: background 0.2s;">Delete</button>
                            </div>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
                        };
                        renderMembers(members);
                        document.getElementById('search').addEventListener('input', (e) => {
                            const term = e.target.value.toLowerCase();
                            const filtered = members.filter(m => 
                                (m.name && m.name.toLowerCase().includes(term)) || 
                                (m.id && m.id.toString().includes(term))
                            );
                            renderMembers(filtered);
                        });

            } catch (error) {
                grid.innerHTML = '<p style="color: red;">Error loading directory data.</p>';
            }
        });

        document.getElementById('member-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('member-id').value;
            const token = localStorage.getItem('authToken');
            
            const fileInput = document.getElementById('member-photo-file');
            let photoUrl = document.getElementById('member-photo').value;

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('photo', fileInput.files[0]);
                
                try {
                    const uploadRes = await fetch('/api/upload', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                    if (uploadRes.ok) {
                        const uploadData = await uploadRes.json();
                        photoUrl = uploadData.photoUrl;
                    } else {
                        alert('Failed to upload photo.');
                        return;
                    }
                } catch (err) {
                    alert('Network error during file upload.');
                    return;
                }
            }

            const payload = {
                name: document.getElementById('member-name').value,
                email: document.getElementById('member-email').value,
                phone: document.getElementById('member-phone').value,
                photo: photoUrl,
                bloodType: document.getElementById('member-blood').value,
                vehicle: document.getElementById('member-vehicle').value,
                address: document.getElementById('member-address').value
            };

            const url = id ? `/api/members/${id}` : '/api/members';
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert('Failed to save member.');
                }
            } catch (err) {
                alert('Network error.');
            }
        });
    </script>
</body>

</html>
